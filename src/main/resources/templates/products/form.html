<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Shop 관리자 - 상품 등록/수정</title>
</head>
<body>
    <h1 th:text="${product.id} != null ? '상품 수정' : '상품 등록'"></h1>

    <form th:action="${product.id} != null
                      ? @{/products/{id}(id=${product.id})}
                      : @{/products}"
          th:object="${product}" method="post">

        <label>상품명: <input type="text" th:field="*{name}" required></label><br>
        <label>카테고리: <input type="text" th:field="*{category}" required></label><br>
        <label>가격: <input type="number" th:field="*{price}" required></label><br>
        <label>재고: <input type="number" th:field="*{stock}" required></label><br>
        <label>AI 추천 점수: <input type="number" th:field="*{aiRecommendScore}"></label><br>
        <label>설명:<br>
            <textarea th:field="*{description}" rows="4" cols="40"></textarea>
        </label><br>

        <button type="submit">저장</button>
        <a th:href="@{/products}">취소</a>
    </form>
</body>
</html>
