<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI Shop 관리자 - 상품 목록</title>
</head>
<body>
    <h1>상품 목록</h1>
    <a th:href="@{/products/new}">+ 새 상품 등록</a>

    <table border="1" cellpadding="6">
        <thead>
        <tr>
            <th>ID</th><th>상품명</th><th>카테고리</th><th>가격</th>
            <th>재고</th><th>AI 추천</th><th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.price} + '원'"></td>
            <td th:text="${p.stock}"></td>
            <td th:text="${p.aiRecommendScore}"></td>
            <td>
                <a th:href="@{/products/{id}/edit(id=${p.id})}">수정</a>
                <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</body>
</html>
